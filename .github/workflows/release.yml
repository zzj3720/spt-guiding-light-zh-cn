name: ci-cd

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate terminology
        shell: pwsh
        run: py -3 -X utf8 .\scripts\validate_guidinglight_terms.py

      - name: Validate gameplay wording
        shell: pwsh
        run: py -3 -X utf8 .\scripts\audit_guidinglight_raid_wording.py

      - name: Verify main-locale mirrors
        shell: pwsh
        run: |
          py -3 -X utf8 .\scripts\extract_guidinglight_mirror_rows.py
          @'
          import csv
          import sys
          from pathlib import Path

          path = Path("docs/audit/guidinglight_main_mirror_verification.tsv")
          with path.open("r", encoding="utf-8-sig", newline="") as f:
              rows = list(csv.DictReader(f, delimiter="\t"))

          drifts = [row for row in rows if row["status"] != "matches_source"]
          if drifts:
              print(f"Found {len(drifts)} mirror drift rows.")
              for row in drifts[:10]:
                  print(row["key"])
              sys.exit(1)

          print(f"Verified {len(rows)} mirrored rows with no drift.")
          '@ | py -3 -X utf8 -

  build-release:
    needs: validate
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      zip_name: ${{ steps.meta.outputs.zip_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute package metadata
        id: meta
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)

          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $version = "${{ github.ref_name }}"
          }
          elseif ("${{ github.event_name }}" -eq "pull_request") {
            $version = "pr-${{ github.event.pull_request.number }}-$sha"
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "manual-$sha"
          }
          else {
            $version = "main-$sha"
          }

          $artifactName = "GuidingLight-zh-cn-$version"
          $zipName = "$artifactName.zip"

          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Build release zip
        shell: pwsh
        run: .\scripts\build_release.ps1 -Version "${{ steps.meta.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: release/*.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-release.outputs.artifact_name }}
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ needs.build-release.outputs.zip_name }}
          generate_release_notes: true
